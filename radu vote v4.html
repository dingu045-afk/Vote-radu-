<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vote for Radu — President 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#002B7F; --yellow:#FCD116; --red:#CE1126;
    --dark:#0d0d14; --light:#f5f0e8;
    --yes-c:#1a7a3c; --no-c:#b01020; --abs-c:#5a5a7a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Barlow',sans-serif; background:var(--dark); color:var(--light); min-height:100vh; }
  .flag { height:7px; background:linear-gradient(to right,var(--blue) 33.3%,var(--yellow) 33.3% 66.6%,var(--red) 66.6%); }
  header { text-align:center; padding:40px 20px 24px; }
  .photo { width:150px; height:150px; border-radius:50%; object-fit:cover; object-position:top center;
            border:4px solid var(--yellow); box-shadow:0 0 0 6px rgba(252,209,22,0.15),0 16px 40px rgba(0,0,0,0.6);
            display:block; margin:0 auto 20px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  h1 { font-family:'Playfair Display',serif; font-size:clamp(1.8rem,5vw,3rem); font-weight:900; }
  h1 span { color:var(--yellow); }
  .sub { font-size:.8rem; letter-spacing:3px; text-transform:uppercase; color:rgba(245,240,232,.45); margin-top:8px; }
  .wrap { max-width:500px; margin:32px auto; padding:0 20px; }
  .qbox { background:rgba(255,255,255,.05); border:1px solid rgba(252,209,22,.2); border-radius:14px;
           padding:28px 24px; text-align:center; margin-bottom:20px; font-size:1.15rem; font-weight:600; }
  .qbox strong { color:var(--yellow); font-family:'Playfair Display',serif; font-size:1.35rem; }
  .btns { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:16px; }
  .vbtn { padding:22px 8px; border-radius:12px; border:2px solid transparent; font-family:'Barlow',sans-serif;
           font-size:.9rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer;
           display:flex; flex-direction:column; align-items:center; gap:8px; transition:all .22s; }
  .vbtn .ico { font-size:2rem; }
  .yes { background:rgba(26,122,60,.12); border-color:var(--yes-c); color:#4ade80; }
  .yes.sel,.yes:hover { background:var(--yes-c); color:#fff; transform:translateY(-3px); box-shadow:0 8px 24px rgba(26,122,60,.4); }
  .no  { background:rgba(176,16,32,.12); border-color:var(--no-c);  color:#f87171; }
  .no.sel,.no:hover   { background:var(--no-c);  color:#fff; transform:translateY(-3px); box-shadow:0 8px 24px rgba(176,16,32,.4); }
  .abs { background:rgba(90,90,122,.12); border-color:var(--abs-c); color:#a0a0c0; }
  .abs.sel,.abs:hover { background:var(--abs-c); color:#fff; transform:translateY(-3px); box-shadow:0 8px 24px rgba(90,90,122,.4); }
  .vbtn:disabled { opacity:.4; cursor:not-allowed; transform:none!important; box-shadow:none!important; }
  #confirmBtn { display:none; width:100%; padding:16px; background:var(--yellow); color:#111; border:none;
                 border-radius:10px; font-family:'Barlow',sans-serif; font-size:1rem; font-weight:700;
                 letter-spacing:2px; text-transform:uppercase; cursor:pointer; margin-bottom:16px; }
  #confirmBtn:hover { opacity:.85; }
  #votedMsg { display:none; text-align:center; color:#4ade80; font-weight:600; padding:12px;
               border:1px solid rgba(74,222,128,.3); border-radius:10px; background:rgba(26,122,60,.1); margin-bottom:16px; }
  .rtitle { font-family:'Playfair Display',serif; font-size:1.1rem; text-align:center; color:rgba(245,240,232,.6);
             letter-spacing:2px; text-transform:uppercase; margin:8px 0 16px; }
  .live { display:flex; align-items:center; justify-content:center; gap:6px; font-size:.75rem;
           color:rgba(245,240,232,.4); letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
  .dot { width:7px; height:7px; border-radius:50%; background:#4ade80; animation:pulse 1.5s infinite; }
  .rrow { margin-bottom:14px; }
  .rlabel { display:flex; justify-content:space-between; font-size:.82rem; font-weight:600;
             letter-spacing:1px; text-transform:uppercase; color:rgba(245,240,232,.55); margin-bottom:6px; }
  .rlabel .val { color:var(--light); }
  .rbg { height:9px; background:rgba(255,255,255,.07); border-radius:99px; overflow:hidden; }
  .rfill { height:100%; border-radius:99px; transition:width .6s cubic-bezier(.4,0,.2,1); width:0%; }
  .fy { background:linear-gradient(to right,#1a7a3c,#4ade80); }
  .fn { background:linear-gradient(to right,#b01020,#f87171); }
  .fa { background:linear-gradient(to right,#5a5a7a,#a0a0c0); }
  .total { text-align:center; margin-top:18px; font-size:.8rem; color:rgba(245,240,232,.35);
            letter-spacing:2px; text-transform:uppercase; }
  .total strong { font-size:1.6rem; color:var(--yellow); font-family:'Playfair Display',serif; display:block; }
  footer { text-align:center; padding:20px; font-size:.7rem; color:rgba(245,240,232,.2); letter-spacing:2px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  @media(max-width:400px){ .vbtn{padding:16px 4px;font-size:.8rem} .ico{font-size:1.5rem} }
  #resetPanel { display:none; position:fixed; top:0; left:0; width:100%; height:100%;
                 background:rgba(0,0,0,0.85); z-index:999; align-items:center; justify-content:center; }
  #resetPanel.show { display:flex; }
  .reset-box { background:#1a1a2e; border:1px solid rgba(252,209,22,.3); border-radius:16px;
                padding:32px 28px; text-align:center; max-width:300px; width:90%; }
  .reset-box h3 { font-family:'Playfair Display',serif; color:var(--yellow); margin-bottom:16px; font-size:1.3rem; }
  .reset-box input { width:100%; padding:12px; border-radius:8px; border:1px solid rgba(255,255,255,.2);
                      background:rgba(255,255,255,.08); color:var(--light); font-size:1rem;
                      font-family:'Barlow',sans-serif; text-align:center; margin-bottom:12px; }
  .reset-box input:focus { outline:none; border-color:var(--yellow); }
  .rbtn-confirm { width:100%; padding:12px; background:var(--red); color:#fff; border:none;
                   border-radius:8px; font-family:'Barlow',sans-serif; font-weight:700; font-size:.9rem;
                   letter-spacing:1px; text-transform:uppercase; cursor:pointer; margin-bottom:8px; }
  .rbtn-cancel { width:100%; padding:10px; background:transparent; color:rgba(245,240,232,.5);
                  border:1px solid rgba(255,255,255,.15); border-radius:8px; font-family:'Barlow',sans-serif;
                  font-size:.85rem; cursor:pointer; }
  #resetMsg { font-size:.85rem; margin-top:8px; min-height:20px; }
</style>
</head>

  <h1>RADU for <span>President</span></h1>
  <p class="sub">Official Public Vote &middot; 2026</p>
</header>

<div class="wrap">
  <div class="qbox">Do you want <strong>Radu</strong> as your President?</div>
  <div class="btns">
    <button class="vbtn yes" onclick="pick('yes')" id="bYes"><span class="ico">&#x2705;</span>YES</button>
    <button class="vbtn no"  onclick="pick('no')"  id="bNo"><span class="ico">&#x274C;</span>NO</button>
    <button class="vbtn abs" onclick="pick('abstain')" id="bAbs"><span class="ico">&#x1F90D;</span>ABSTAIN</button>
  </div>
  <button id="confirmBtn" onclick="submitVote()">CONFIRM VOTE</button>
  <div id="votedMsg">&#x2714; Your vote has been recorded. Thank you!</div>
  <div class="live"><span class="dot"></span>Live Results</div>
  <p class="rtitle">Current Standings</p>
  <div class="rrow">
    <div class="rlabel"><span>YES</span><span class="val" id="cYes">loading...</span></div>
    <div class="rbg"><div class="rfill fy" id="fYes"></div></div>
  </div>
  <div class="rrow">
    <div class="rlabel"><span>NO</span><span class="val" id="cNo">loading...</span></div>
    <div class="rbg"><div class="rfill fn" id="fNo"></div></div>
  </div>
  <div class="rrow">
    <div class="rlabel"><span>ABSTAIN</span><span class="val" id="cAbs">loading...</span></div>
    <div class="rbg"><div class="rfill fa" id="fAbs"></div></div>
  </div>
  <div class="total">Total votes<strong id="totalV">0</strong></div>
</div>

<div id="resetPanel">
  <div class="reset-box">
    <h3>&#x1F512; Admin Reset</h3>
    <input type="password" id="resetInput" placeholder="Enter password" />
    <button class="rbtn-confirm" onclick="doReset()">RESET ALL VOTES</button>
    <button class="rbtn-cancel" onclick="closeReset()">Cancel</button>
    <div id="resetMsg"></div>
  </div>
</div>

<div class="flag"></div>
<footer>RADU FOR PRESIDENT &middot; PUBLIC OPINION POLL &middot; 2026</footer>

<script>
var GH_TOKEN = "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";
var GH_USER = "dingu045-afk";
var GH_REPO = "Vote-radu-";
var VOTES_FILE = "votes.json";
var PASS = "radu2026";
var API = "https://api.github.com/repos/" + GH_USER + "/" + GH_REPO + "/contents/" + VOTES_FILE;

var sel = null;
var hasVoted = localStorage.getItem('radu2026_voted') === '1';
var tapCount = 0;
var tapTimer = null;
var currentSha = null;

function photoTap() {
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(function() { tapCount = 0; }, 2000);
  if (tapCount >= 5) {
    tapCount = 0;
    document.getElementById('resetPanel').classList.add('show');
    document.getElementById('resetInput').value = '';
    document.getElementById('resetMsg').textContent = '';
  }
}

function closeReset() {
  document.getElementById('resetPanel').classList.remove('show');
}

function getVotes() {
  return fetch(API, {
    headers: {
      'Authorization': 'token ' + GH_TOKEN,
      'Accept': 'application/vnd.github.v3+json'
    }
  }).then(function(r) {
    if (r.status === 404) {
      return { data: {yes:0,no:0,abstain:0}, sha: null };
    }
    return r.json().then(function(f) {
      var content = atob(f.content.replace(/\n/g,''));
      currentSha = f.sha;
      return { data: JSON.parse(content), sha: f.sha };
    });
  });
}

function saveVotes(v, sha) {
  var content = btoa(JSON.stringify(v));
  var body = {
    message: 'vote update',
    content: content
  };
  if (sha) body.sha = sha;
  return fetch(API, {
    method: 'PUT',
    headers: {
      'Authorization': 'token ' + GH_TOKEN,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
}

function pick(c) {
  if (hasVoted) return;
  sel = c;
  ['yes','no','abstain'].forEach(function(k) {
    var map = {yes:'bYes',no:'bNo',abstain:'bAbs'};
    document.getElementById(map[k]).classList.remove('sel');
  });
  var map = {yes:'bYes',no:'bNo',abstain:'bAbs'};
  document.getElementById(map[c]).classList.add('sel');
  document.getElementById('confirmBtn').style.display = 'block';
}

function submitVote() {
  if (!sel || hasVoted) return;
  document.getElementById('confirmBtn').disabled = true;
  getVotes().then(function(result) {
    var v = result.data;
    v[sel] = (v[sel] || 0) + 1;
    return saveVotes(v, result.sha).then(function() {
      hasVoted = true;
      localStorage.setItem('radu2026_voted','1');
      document.getElementById('bYes').disabled = true;
      document.getElementById('bNo').disabled = true;
      document.getElementById('bAbs').disabled = true;
      document.getElementById('confirmBtn').style.display = 'none';
      document.getElementById('votedMsg').style.display = 'block';
      render(v);
    });
  }).catch(function() {
    document.getElementById('confirmBtn').disabled = false;
  });
}

function doReset() {
  var pass = document.getElementById('resetInput').value;
  if (pass !== PASS) {
    document.getElementById('resetMsg').style.color = '#f87171';
    document.getElementById('resetMsg').textContent = 'Wrong password!';
    return;
  }
  document.getElementById('resetMsg').style.color = '#4ade80';
  document.getElementById('resetMsg').textContent = 'Resetting...';
  getVotes().then(function(result) {
    return saveVotes({yes:0,no:0,abstain:0}, result.sha);
  }).then(function() {
    document.getElementById('resetMsg').textContent = 'Done! Votes reset to 0.';
    localStorage.removeItem('radu2026_voted');
    hasVoted = false;
    sel = null;
    document.getElementById('bYes').disabled = false;
    document.getElementById('bNo').disabled = false;
    document.getElementById('bAbs').disabled = false;
    document.getElementById('bYes').classList.remove('sel');
    document.getElementById('bNo').classList.remove('sel');
    document.getElementById('bAbs').classList.remove('sel');
    document.getElementById('votedMsg').style.display = 'none';
    document.getElementById('confirmBtn').style.display = 'none';
    render({yes:0,no:0,abstain:0});
    setTimeout(closeReset, 1500);
  }).catch(function() {
    document.getElementById('resetMsg').style.color = '#f87171';
    document.getElementById('resetMsg').textContent = 'Error. Try again.';
  });
}

function render(v) {
  var yes = v.yes || 0;
  var no = v.no || 0;
  var abstain = v.abstain || 0;
  var total = yes + no + abstain;
  document.getElementById('totalV').textContent = total;
  [{cnt:yes,fid:'fYes',cid:'cYes'},{cnt:no,fid:'fNo',cid:'cNo'},{cnt:abstain,fid:'fAbs',cid:'cAbs'}].forEach(function(item) {
    var pct = total > 0 ? Math.round(item.cnt/total*100) : 0;
    document.getElementById(item.cid).textContent = item.cnt + ' vote' + (item.cnt===1?'':'s') + ' · ' + pct + '%';
    document.getElementById(item.fid).style.width = pct + '%';
  });
}

function loadResults() {
  getVotes().then(function(r) { render(r.data); }).catch(function(){});
}

if (hasVoted) {
  document.getElementById('bYes').disabled = true;
  document.getElementById('bNo').disabled = true;
  document.getElementById('bAbs').disabled = true;
  document.getElementById('votedMsg').style.display = 'block';
}
loadResults();
setInterval(loadResults, 8000);
</script>
</body>
</html>
